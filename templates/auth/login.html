<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-100">
<head>
  <meta charset="UTF-8">
  <title>Sign In · PlagCheck</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="text-center mb-8">
      <span class="text-3xl">📄</span>
      <h1 class="text-2xl font-bold text-slate-900 mt-2">PlagCheck</h1>
      <p class="text-slate-500 text-sm mt-1">Sign in to your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">

      {% if error %}
      <div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
          <input type="email" name="email" required autofocus
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500"
            placeholder="you@university.edu">
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500"
            placeholder="••••••••">
        </div>

        <button type="submit"
          class="w-full bg-slate-900 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-slate-700 transition">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-sm text-slate-500 mt-5">
      Don't have an account?
      <a href="/register" class="text-slate-800 font-medium hover:underline">Register</a>
    </p>
  </div>

</body>
</html>
